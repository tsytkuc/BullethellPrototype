  <text x="320" y="145" text-anchor="middle" fill="#eef4ff" font-size="38" font-family="Arial Black, Arial, sans-serif">TEMP PORTRAIT</text>

  <rect x="164" y="720" width="312" height="62" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>
