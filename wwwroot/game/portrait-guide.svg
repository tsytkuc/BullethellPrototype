  <rect x="235" y="252" width="170" height="18" rx="9" fill="#6ee7ff" opacity="0.75"/>
  <rect x="252" y="304" width="136" height="18" rx="9" fill="#6ee7ff" opacity="0.42"/>
  <rect x="268" y="356" width="104" height="18" rx="9" fill="#6ee7ff" opacity="0.24"/>

