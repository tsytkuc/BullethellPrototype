      <stop offset="0%" stop-color="#121b2a"/>
      <stop offset="100%" stop-color="#08111a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182638"/>
      <stop offset="100%" stop-color="#0e1723"/>
    </linearGradient>
  </defs>

  <rect width="640" height="880" fill="url(#bg)"/>
  <circle cx="320" cy="220" r="176" fill="rgba(110,231,255,0.10)"/>
  <circle cx="320" cy="220" r="128" fill="rgba(255,209,102,0.08)"/>

  <rect x="86" y="68" width="468" height="744" rx="36" fill="url(#panel)" stroke="rgba(255,255,255,0.10)" stroke-width="4"/>

  <circle cx="320" cy="286" r="94" fill="#2d425a" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
